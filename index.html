<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Quiz Game</title>
 <style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #a8e6cf, #56ab2f);
  background-size: 400% 400%;
  animation: bgShift 15s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  color: #1b5e20;
  padding: 10px;
}

@keyframes bgShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.quiz-container {
  background: linear-gradient(145deg, #e0f7da, #a5d6a7);
  padding: 20px 25px;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 15px 35px rgba(0, 100, 0, 0.3), 0 0 25px rgba(76, 175, 80, 0.2) inset;
  text-align: center;
  animation: fadein 0.8s ease-in-out;
  border: 2px solid #00c853;
  color: #1b5e20;
  box-sizing: border-box;
}

@keyframes fadein {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}

h2 {
  margin: 0 0 20px;
  color: #1b5e20;
  font-size: 1.4rem;
  text-shadow: 1px 1px 3px #76ff03;
}

.option {
  background: #d0f8ce;
  padding: 12px;
  margin: 8px 0;
  cursor: pointer;
  border-radius: 15px;
  border: 2px solid transparent;
  transition: all 0.3s ease;
  user-select: none;
  color: #1b5e20;
  font-weight: bold;
  box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
  font-size: 0.95rem;
}

.option:hover {
  background: #a5d6a7;
  transform: scale(1.03) translateY(-1px);
  border-color: #00c853;
  box-shadow: 0 6px 20px rgba(76, 175, 80, 0.5);
}

.selected {
  background: rgba(0, 200, 83, 0.25);
  border-color: #00c853;
  box-shadow: 0 0 15px rgba(0, 200, 83, 0.4);
}

.correct {
  background: rgba(0, 200, 83, 0.35) !important;
  border-color: #00c853 !important;
  color: #00c853;
  box-shadow: 0 0 15px rgba(0, 200, 83, 0.7);
}

.wrong {
  background: rgba(200, 255, 200, 0.35) !important;
  border-color: #76ff03 !important;
  color: #76ff03;
  box-shadow: 0 0 12px rgba(118, 255, 3, 0.6);
}

button {
  margin-top: 15px;
  padding: 12px 28px;
  cursor: pointer;
  background: linear-gradient(45deg, #00c853, #64dd17);
  color: white;
  font-weight: bold;
  border: none;
  border-radius: 15px;
  transition: all 0.3s ease;
  font-size: 1rem;
  box-shadow: 0 6px 20px rgba(76, 175, 80, 0.5), 0 0 10px #00c853 inset;
}

button:hover {
  background: linear-gradient(45deg, #76ff03, #00c853);
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 8px 25px rgba(76, 175, 80, 0.7), 0 0 15px #00c853 inset;
}

.hidden { display: none; }

.message {
  margin-top: 12px;
  font-weight: bold;
  font-size: 1.05em;
  min-height: 1.2em;
  color: #1b5e20;
  text-shadow: 0 0 3px #76ff03;
}

.progress-container {
  background: #b9f6ca;
  border-radius: 25px;
  height: 12px;
  margin-bottom: 15px;
  overflow: hidden;
  box-shadow: inset 0 0 8px rgba(76, 175, 80, 0.3);
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00c853, #76ff03);
  transition: width 0.5s ease;
  border-radius: 25px;
}

.score {
  font-size: 13px;
  color: #00c853;
  font-weight: bold;
  margin-bottom: 8px;
  text-shadow: 0 0 3px #76ff03;
}

.attempts {
  font-size: 11px;
  color: #1b5e20;
  margin-top: 3px;
  min-height: 1em;
  text-shadow: 0 0 2px #76ff03;
}

/* Floating End Quiz button */
#endQuizBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 14px 26px;
  background: linear-gradient(45deg, #ff1744, #d50000);
  border-radius: 50px;
  font-size: 1rem;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(255, 23, 68, 0.5);
  transition: all 0.3s ease;
  z-index: 999;
}

#endQuizBtn:hover {
  background: linear-gradient(45deg, #d50000, #ff1744);
  transform: scale(1.08);
}

/* -------------------- MEDIA QUERIES -------------------- */
@media (max-width: 600px) {
  .quiz-container {
    padding: 15px 20px;
  }
  h2 { font-size: 1.2rem; }
  .option { font-size: 0.9rem; padding: 10px; }
  button { font-size: 0.95rem; padding: 10px 22px; }
}
</style>
</head>
<body>

<div class="quiz-container" id="quizBox">
  <div class="score" id="scoreDisplay">Score: 0</div>
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <h2 id="question">Question text</h2>
  <div id="options"></div>

  <button id="submitBtn">Submit</button>
  <button id="retryBtn" class="hidden">Retry</button>
  <button id="nextBtn" class="hidden">Next</button>

  <div id="message" class="message"></div>
  <div id="attempts" class="attempts"></div>
</div>

<!-- Floating End Quiz Button -->
<button id="endQuizBtn">End Quiz</button>

<script>
/* -------------------- DATA -------------------- */

const quizData = [
  { question: "Q1. Which of these is a perfect square?", options: ["50", "81", "45", "98"], answer: 1 },
  { question: "Q2. The square root of 121 is:", options: ["10", "11", "12", "13"], answer: 1 },
  { question: "Q3. Which number will always have its square ending in 25?", options: ["15", "20", "25", "35"], answer: 3 },
  { question: "Q4. The sum of first 6 odd numbers is:", options: ["25", "36", "49", "64"], answer: 2 },
  { question: "Q5. Which of these cannot be the unit digit of a perfect square?", options: ["1", "4", "7", "9"], answer: 2 },
  { question: "Q6. √144 = ?", options: ["10", "11", "12", "13"], answer: 2 },
  { question: "Q7. The difference between 20² and 19² is:", options: ["37", "39", "41", "45"], answer: 2 },
  { question: "Q8. If 25 × 25 = 625, then 250 × 250 = ?", options: ["62,500", "6250", "62,250", "6,25,000"], answer: 3 },
  { question: "Q9. Which of these is a Pythagorean triplet?", options: ["(8, 15, 17)", "(6, 8, 10)", "(9, 12, 15)", "All of the above"], answer: 3 },
  { question: "Q10. Square of 45 = ?", options: ["1825", "1925", "2025", "2125"], answer: 2 },
  { question: "Q11. √2500 = ?", options: ["40", "45", "50", "55"], answer: 2 },
  { question: "Q12. If n = 12, then n² – (n – 1)² = ?", options: ["21", "23", "24", "25"], answer: 2 },
  { question: "Q13. Which of these numbers is NOT a perfect square?", options: ["225", "400", "625", "650"], answer: 3 },
  { question: "Q14. The square of 99 is:", options: ["9701", "9801", "9901", "9999"], answer: 1 },
  { question: "Q15. √0.49 = ?", options: ["0.5", "0.6", "0.7", "0.8"], answer: 2 },
  { question: "Q16. The square of an even number is always:", options: ["Odd", "Even", "Prime", "Composite"], answer: 1 },
  { question: "Q17. If 13² = 169, then (13 × 14) = ?", options: ["181", "182", "183", "184"], answer: 1 },
  { question: "Q18. The sum of squares of first 3 natural numbers = ?", options: ["10", "12", "14", "15"], answer: 3 },
  { question: "Q19. Which of the following is closest to √10?", options: ["3.0", "3.1", "3.2", "3.3"], answer: 2 },
  { question: "Q20. If the diagonal of a square is 10 cm, its area is:", options: ["50 cm²", "60 cm²", "70 cm²", "100 cm²"], answer: 0 }

];

/* -------------------- STATE -------------------- */
let currentQuestion = 0;
let selectedOption = null;
let score = 0;
let wrongAttemptsForCurrent = 0;
const MAX_ATTEMPTS = 3;

const questionEl = document.getElementById('question');
const optionsEl = document.getElementById('options');
const submitBtn = document.getElementById('submitBtn');
const retryBtn = document.getElementById('retryBtn');
const nextBtn = document.getElementById('nextBtn');
const messageEl = document.getElementById('message');
const attemptsEl = document.getElementById('attempts');
const progressBar = document.getElementById('progressBar');
const scoreDisplay = document.getElementById('scoreDisplay');
const endQuizBtn = document.getElementById('endQuizBtn');

/* -------------------- SOUNDS -------------------- */
const correctSound = new Audio("correct-6033.mp3");
const wrongSound   = new Audio("error-04-199275.mp3");
correctSound.preload = "auto";
wrongSound.preload = "auto";

/* -------------------- RENDER -------------------- */
function renderQuestion({ resetAttempts = false } = {}) {
  const q = quizData[currentQuestion];
  if (resetAttempts) wrongAttemptsForCurrent = 0;
  questionEl.textContent = q.question;
  optionsEl.innerHTML = '';
  messageEl.textContent = '';
  attemptsEl.textContent = wrongAttemptsForCurrent > 0
    ? `Attempts used: ${wrongAttemptsForCurrent}/${MAX_ATTEMPTS}`
    : '';
  submitBtn.classList.remove('hidden');
  retryBtn.classList.add('hidden');
  nextBtn.classList.add('hidden');

  q.options.forEach((option, index) => {
    const div = document.createElement('div');
    div.textContent = option;
    div.classList.add('option');
    div.onclick = () => {
      if (submitBtn.classList.contains('hidden')) return;
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      div.classList.add('selected');
      selectedOption = index;
    };
    optionsEl.appendChild(div);
  });

  updateProgress();
}
function updateProgress() {
  const progress = (currentQuestion / quizData.length) * 100;
  progressBar.style.width = progress + "%";
}
function lockOptions() { document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none'); }
function unlockOptions() { document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'auto'); }

/* -------------------- SUBMIT -------------------- */
submitBtn.onclick = () => {
  if (selectedOption === null) { alert("Please select an option!"); return; }
  const correctAnswer = quizData[currentQuestion].answer;
  const optionDivs = document.querySelectorAll('.option');
  lockOptions();
  if (selectedOption === correctAnswer) {
    messageEl.textContent = "✅ Correct!";
    score++;
    scoreDisplay.textContent = `Score: ${score}`;
    optionDivs[selectedOption].classList.add('correct');
    correctSound.play();
    submitBtn.classList.add('hidden');
    retryBtn.classList.add('hidden');
    nextBtn.classList.remove('hidden');
  } else {
    wrongAttemptsForCurrent++;
    wrongSound.play();
    optionDivs[selectedOption].classList.add('wrong');
    if (wrongAttemptsForCurrent >= MAX_ATTEMPTS) {
      messageEl.textContent = "❌ Out of attempts.";
      optionDivs[correctAnswer].classList.add('correct');
      submitBtn.classList.add('hidden');
      retryBtn.classList.add('hidden');
      nextBtn.classList.remove('hidden');
      attemptsEl.textContent = `Attempts used: ${wrongAttemptsForCurrent}/${MAX_ATTEMPTS}`;
    } else {
      messageEl.textContent = `❌ Incorrect! Try again (${wrongAttemptsForCurrent}/${MAX_ATTEMPTS})`;
      attemptsEl.textContent = `Attempts used: ${wrongAttemptsForCurrent}/${MAX_ATTEMPTS}`;
      submitBtn.classList.add('hidden');
      retryBtn.classList.remove('hidden');
      nextBtn.classList.add('hidden');
    }
  }
};
retryBtn.onclick = () => { selectedOption = null; unlockOptions(); renderQuestion({ resetAttempts: false }); };
nextBtn.onclick = () => {
  currentQuestion++;
  selectedOption = null;
  if (currentQuestion < quizData.length) {
    renderQuestion({ resetAttempts: true }); unlockOptions();
  } else { endQuiz(); }
};

/* -------------------- END QUIZ -------------------- */
function endQuiz() {
  progressBar.style.width = "100%";
  questionEl.textContent = "🎉 Quiz Ended!";
  optionsEl.innerHTML = "";
  nextBtn.classList.add('hidden');
  retryBtn.classList.add('hidden');
  submitBtn.classList.add('hidden');

  const attempted = currentQuestion + 1; // how many questions were shown
  const percentage = (score / attempted) * 100;
  let performanceMessage = "";
  if (percentage >= 90) performanceMessage = "🌟 Excellent!";
  else if (percentage >= 70) performanceMessage = "👍 Good Job!";
  else if (percentage >= 50) performanceMessage = "🙂 Average!";
  else performanceMessage = "🔄 Please try again!";

  messageEl.textContent = `${performanceMessage}`;
  attemptsEl.textContent = '';
  scoreDisplay.textContent = `Final Score: ${score} / ${attempted} (${Math.round(percentage)}%)`;
}
endQuizBtn.onclick = endQuiz;

/* -------------------- INIT -------------------- */
renderQuestion({ resetAttempts: true });
</script>
</body>

</html>
