<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🧮 Math Quiz</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(120deg, #f0f9ff, #cbebff, #a6cfff);
      background-size: 300% 300%;
      animation: bgShift 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 10px;
      overflow: hidden;
    }

    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* floating math symbols */
    .symbol {
      position: absolute;
      font-size: 2rem;
      opacity: 0.15;
      animation: float 14s linear infinite;
      color: #1565c0;
    }
    @keyframes float {
      from { transform: translateY(100vh) rotate(0deg); }
      to { transform: translateY(-120vh) rotate(360deg); }
    }

    .quiz-container {
      backdrop-filter: blur(15px) saturate(180%);
      -webkit-backdrop-filter: blur(15px) saturate(180%);
      background: rgba(255, 255, 255, 0.6);
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 650px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadein 0.8s ease-in-out;
      border: 2px solid rgba(255,255,255,0.4);
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin: 0 0 20px;
      color: #0d47a1;
      font-size: 1.8rem;
      text-shadow: 1px 1px 3px #90caf9;
    }
    h2::before { content: "🧮 "; }
    h2::after { content: " ➕ ✖️ ➗"; }

    .option {
      background: #fff;
      padding: 14px;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 15px;
      border: 2px solid transparent;
      transition: all 0.3s ease;
      user-select: none;
      color: #0d47a1;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(13,71,161,0.2);
      font-size: 1rem;
    }
    .option:hover {
      background: #e3f2fd;
      transform: scale(1.03) translateY(-2px);
      border-color: #42a5f5;
      box-shadow: 0 8px 20px rgba(66,165,245,0.4);
    }

    .selected {
      background: #bbdefb;
      border-color: #42a5f5;
      box-shadow: 0 0 12px rgba(66,165,245,0.6);
    }

    .correct {
      background: #c8e6c9 !important;
      border-color: #43a047 !important;
      color: #2e7d32 !important;
    }
    .wrong {
      background: #ffcdd2 !important;
      border-color: #e53935 !important;
      color: #b71c1c !important;
    }

    button {
      margin-top: 15px;
      padding: 12px 28px;
      cursor: pointer;
      background: linear-gradient(45deg, #42a5f5, #1e88e5);
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      transition: all 0.3s ease;
      font-size: 1rem;
      box-shadow: 0 6px 20px rgba(66,165,245,0.4),
                  0 0 10px #42a5f5 inset;
    }
    button:hover {
      background: linear-gradient(45deg, #64b5f6, #2196f3);
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 25px rgba(33,150,243,0.5),
                  0 0 15px #64b5f6 inset;
    }

    .hidden { display: none; }

    .message {
      margin-top: 12px;
      font-weight: bold;
      font-size: 1.1em;
      min-height: 1.2em;
      color: #0d47a1;
    }

    .progress-container {
      background: #eeeeee;
      border-radius: 25px;
      height: 14px;
      margin-bottom: 15px;
      overflow: hidden;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.2);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f44336, #ff9800, #4caf50, #2196f3, #9c27b0);
      background-size: 400% 400%;
      animation: rainbow 6s ease infinite;
      transition: width 0.5s ease;
      border-radius: 25px;
    }

    @keyframes rainbow {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .score {
      font-size: 15px;
      color: #0d47a1;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .attempts {
      font-size: 12px;
      color: #444;
      margin-top: 3px;
      min-height: 1em;
    }

    #endQuizBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 14px 26px;
      background: linear-gradient(45deg, #ef5350, #e53935);
      border-radius: 50px;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(239,83,80,0.5);
      transition: all 0.3s ease;
      z-index: 999;
    }
    #endQuizBtn:hover {
      background: linear-gradient(45deg, #e53935, #ef5350);
      transform: scale(1.08);
    }

    /* drag and drop styling */
    .match-container {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 10px;
      text-align: left;
    }
    .match-col {
      width: 45%;
    }
    .droppable {
      padding: 14px;
      margin: 10px 0;
      background: #fafafa;
      border: 2px dashed #90caf9;
      border-radius: 12px;
      transition: background 0.3s ease, border 0.3s ease;
    }
    .droppable.dragover {
      background: #e3f2fd;
      border-color: #42a5f5;
    }
  </style>
</head>
<body>

<!-- floating symbols -->
<div class="symbol" style="left:5%; animation-delay:0s;">➕</div>
<div class="symbol" style="left:20%; animation-delay:2s;">✖️</div>
<div class="symbol" style="left:40%; animation-delay:4s;">➗</div>
<div class="symbol" style="left:60%; animation-delay:1s;">√</div>
<div class="symbol" style="left:80%; animation-delay:3s;">π</div>

<div class="quiz-container" id="quizBox">
  <div class="score" id="scoreDisplay">Score: 0</div>
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <h2 id="question">Question text</h2>
  <div id="options"></div>
  <button id="submitBtn">Submit</button>
  <button id="retryBtn" class="hidden">Retry</button>
  <button id="nextBtn" class="hidden">Next</button>
  <div id="message" class="message"></div>
  <div id="attempts" class="attempts"></div>
</div>
<button id="endQuizBtn">End Quiz</button>

<script>
// =====================
// Add your questions in quizData
// =====================
const quizData = [
  { question: "Q1. Which of these is a perfect square?", options: ["50", "81", "45", "98"], answer: 1 }, { question: "Q2. The square root of 121 is:", options: ["10", "11", "12", "13"], answer: 1 }, { question: "Q3. Which number will always have its square ending in 25?", options: ["15", "20", "25", "35"], answer: 3 }, { question: "Q4. The sum of first 6 odd numbers is:", options: ["25", "36", "49", "64"], answer: 2 }, { question: "Q5. Which of these cannot be the unit digit of a perfect square?", options: ["1", "4", "7", "9"], answer: 2 }, { question: "Q6. √144 = ?", options: ["10", "11", "12", "13"], answer: 2 }, { question: "Q7. The difference between 20² and 19² is:", options: ["37", "39", "41", "45"], answer: 2 }, { question: "Q8. If 25 × 25 = 625, then 250 × 250 = ?", options: ["62,500", "6250", "62,250", "6,25,000"], answer: 3 }, { question: "Q9. Which of these is a Pythagorean triplet?", options: ["(8, 15, 17)", "(6, 8, 10)", "(9, 12, 15)", "All of the above"], answer: 3 }, { question: "Q10. Square of 45 = ?", options: ["1825", "1925", "2025", "2125"], answer: 2 }, { question: "Q11. √2500 = ?", options: ["40", "45", "50", "55"], answer: 2 }, { question: "Q12. If n = 12, then n² – (n – 1)² = ?", options: ["21", "23", "24", "25"], answer: 2 }, { question: "Q13. Which of these numbers is NOT a perfect square?", options: ["225", "400", "625", "650"], answer: 3 }, { question: "Q14. The square of 99 is:", options: ["9701", "9801", "9901", "9999"], answer: 1 }, { question: "Q15. √0.49 = ?", options: ["0.5", "0.6", "0.7", "0.8"], answer: 2 }, { question: "Q16. The square of an even number is always:", options: ["Odd", "Even", "Prime", "Composite"], answer: 1 }, { question: "Q17. If 13² = 169, then (13 × 14) = ?", options: ["181", "182", "183", "184"], answer: 1 }, { question: "Q18. The sum of squares of first 3 natural numbers = ?", options: ["10", "12", "14", "15"], answer: 3 }, { question: "Q19. Which of the following is closest to √10?", options: ["3.0", "3.1", "3.2", "3.3"], answer: 2 }, { question: "Q20. If the diagonal of a square is 10 cm, its area is:", options: ["50 cm²", "60 cm²", "70 cm²", "100 cm²"], answer: 0 } ];
type: "match", question: "Q21. Match the perfect squares with their square roots:", pairs: [ { left: "49", right: "7" }, { left: "81", right: "9" }, { left: "144", right: "12" }, { left: "225", right: "15" } ] },
  ];

let currentQuestion = 0;
let selectedOption = null;
let score = 0;
let wrongAttemptsForCurrent = 0;
const MAX_ATTEMPTS = 3;

const questionEl = document.getElementById('question');
const optionsEl = document.getElementById('options');
const submitBtn = document.getElementById('submitBtn');
const retryBtn = document.getElementById('retryBtn');
const nextBtn = document.getElementById('nextBtn');
const messageEl = document.getElementById('message');
const attemptsEl = document.getElementById('attempts');
const progressBar = document.getElementById('progressBar');
const scoreDisplay = document.getElementById('scoreDisplay');
const endQuizBtn = document.getElementById('endQuizBtn');

const correctSound = new Audio("correct-6033.mp3");
const wrongSound   = new Audio("error-04-199275.mp3");

// === Drag & Drop Helpers ===
function renderMatchQuestion(q) {
  optionsEl.innerHTML = "";
  messageEl.textContent = "";
  attemptsEl.textContent = "";

  const container = document.createElement("div");
  container.className = "match-container";

  const leftCol = document.createElement("div");
  leftCol.className = "match-col";
  const rightCol = document.createElement("div");
  rightCol.className = "match-col";

  // shuffle right side values
  const shuffledRight = q.pairs.map(p => p.right).sort(() => Math.random() - 0.5);

  q.pairs.forEach(pair => {
    const leftDiv = document.createElement("div");
    leftDiv.textContent = pair.left;
    leftDiv.classList.add("droppable");
    leftDiv.dataset.answer = pair.right;
    leftCol.appendChild(leftDiv);
  });

  shuffledRight.forEach(val => {
    const rightDiv = document.createElement("div");
    rightDiv.textContent = val;
    rightDiv.classList.add("option");
    rightDiv.draggable = true;
    rightDiv.ondragstart = e => e.dataTransfer.setData("text", val);
    rightCol.appendChild(rightDiv);
  });

  container.appendChild(leftCol);
  container.appendChild(rightCol);
  optionsEl.appendChild(container);

  // allow drop
  optionsEl.querySelectorAll(".droppable").forEach(left => {
    left.ondragover = e => {
      e.preventDefault();
      left.classList.add("dragover");
    };
    left.ondragleave = () => left.classList.remove("dragover");
    left.ondrop = e => {
      e.preventDefault();
      left.classList.remove("dragover");
      const draggedVal = e.dataTransfer.getData("text");
      if (draggedVal === left.dataset.answer) {
        left.classList.add("correct");
        left.textContent = `${left.textContent} = ${draggedVal}`;
        score++;
        scoreDisplay.textContent = `Score: ${score}`;
        correctSound.play();
      } else {
        left.classList.add("wrong");
        wrongSound.play();
      }
    };
  });
}

function renderQuestion({ resetAttempts = false } = {}) {
  const q = quizData[currentQuestion];
  if (q.type === "match") {
    questionEl.textContent = q.question;
    submitBtn.classList.add("hidden");
    retryBtn.classList.add("hidden");
    nextBtn.classList.remove("hidden");
    renderMatchQuestion(q);
    updateProgress();
    return;
  }
  if (resetAttempts) wrongAttemptsForCurrent = 0;
  questionEl.textContent = q.question;
  optionsEl.innerHTML = '';
  messageEl.textContent = '';
  attemptsEl.textContent = wrongAttemptsForCurrent > 0
    ? `Attempts used: ${wrongAttemptsForCurrent}/${MAX_ATTEMPTS}` : '';
  submitBtn.classList.remove('hidden');
  retryBtn.classList.add('hidden');
  nextBtn.classList.add('hidden');
  q.options.forEach((option, index) => {
    const div = document.createElement('div');
    div.textContent = option;
    div.classList.add('option');
    div.onclick = () => {
      if (submitBtn.classList.contains('hidden')) return;
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      div.classList.add('selected');
      selectedOption = index;
    };
    optionsEl.appendChild(div);
  });
  updateProgress();
}

function updateProgress() {
  const progress = (currentQuestion / quizData.length) * 100;
  progressBar.style.width = progress + "%";
}
function lockOptions() { document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none'); }
function unlockOptions() { document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'auto'); }

submitBtn.onclick = () => {
  if (selectedOption === null) { alert("Please select an option!"); return; }
  const correctAnswer = quizData[currentQuestion].answer;
  const optionDivs = document.querySelectorAll('.option');
  lockOptions();
  if (selectedOption === correctAnswer) {
    messageEl.textContent = "✅ Correct!";
    score++;
    scoreDisplay.textContent = `Score: ${score}`;
    optionDivs[selectedOption].classList.add('correct');
    correctSound.play();
    submitBtn.classList.add('hidden');
    retryBtn.classList.add('hidden');
    nextBtn.classList.remove('hidden');
  } else {
    wrongAttemptsForCurrent++;
    wrongSound.play();
    optionDivs[selectedOption].classList.add('wrong');
    if (wrongAttemptsForCurrent >= MAX_ATTEMPTS) {
      messageEl.textContent = "❌ Out of attempts.";
      optionDivs[correctAnswer].classList.add('correct');
      submitBtn.classList.add('hidden');
      retryBtn.classList.add('hidden');
      nextBtn.classList.remove('hidden');
      attemptsEl.textContent = `Attempts used: ${wrongAttemptsForCurrent}/${MAX_ATTEMPTS}`;
    } else {
      messageEl.textContent = `❌ Incorrect! Try again (${wrongAttemptsForCurrent}/${MAX_ATTEMPTS})`;
      attemptsEl.textContent = `Attempts used: ${wrongAttemptsForCurrent}/${MAX_ATTEMPTS}`;
      submitBtn.classList.add('hidden');
      retryBtn.classList.remove('hidden');
      nextBtn.classList.add('hidden');
    }
  }
};
retryBtn.onclick = () => { selectedOption = null; unlockOptions(); renderQuestion({ resetAttempts: false }); };
nextBtn.onclick = () => {
  currentQuestion++;
  selectedOption = null;
  if (currentQuestion < quizData.length) {
    renderQuestion({ resetAttempts: true }); unlockOptions();
  } else { endQuiz(); }
};
function endQuiz() {
  progressBar.style.width = "100%";
  questionEl.textContent = "🎉 Quiz Ended!";
  optionsEl.innerHTML = "";
  nextBtn.classList.add('hidden');
  retryBtn.classList.add('hidden');
  submitBtn.classList.add('hidden');
  const attempted = quizData.length;
  const percentage = (score / attempted) * 100;
  let performanceMessage = "";
  if (percentage >= 90) performanceMessage = "🌟 Excellent!";
  else if (percentage >= 70) performanceMessage = "👍 Good Job!";
  else if (percentage >= 50) performanceMessage = "🙂 Average!";
  else performanceMessage = "🔄 Please try again!";
  messageEl.textContent = performanceMessage;
  attemptsEl.textContent = '';
  scoreDisplay.textContent = `Final Score: ${score} / ${attempted} (${Math.round(percentage)}%)`;
}
endQuizBtn.onclick = endQuiz;

// start quiz
if (quizData.length > 0) {
  renderQuestion({ resetAttempts: true });
}
</script>
</body>
</html>
