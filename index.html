<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Math Quiz 🧮</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffffff, #e3f2fd);
      background-size: 400% 400%;
      animation: bgShift 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #333;
      padding: 10px;
    }

    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .quiz-container {
      background: #ffffff;
      padding: 25px 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 550px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 0 25px rgba(0,150,255,0.1) inset;
      text-align: center;
      animation: fadein 0.8s ease-in-out;
      border: 2px solid #90caf9;
      color: #333;
      box-sizing: border-box;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin: 0 0 20px;
      color: #1565c0;
      font-size: 1.6rem;
      text-shadow: 1px 1px 3px #90caf9;
    }
    h2::before { content: "🧮 "; }
    h2::after { content: " ✖️➗"; }

    .option {
      background: #f5f9ff;
      padding: 14px;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 15px;
      border: 2px solid #e3f2fd;
      transition: all 0.3s ease;
      user-select: none;
      color: #1565c0;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(21,101,192,0.15);
      font-size: 1rem;
    }
    .option:hover {
      background: #e3f2fd;
      transform: scale(1.03) translateY(-2px);
      border-color: #42a5f5;
      box-shadow: 0 8px 20px rgba(66,165,245,0.3);
    }

    .selected {
      background: #bbdefb;
      border-color: #42a5f5;
      box-shadow: 0 0 12px rgba(66,165,245,0.5);
    }

    .correct {
      background: #c8e6c9 !important;
      border-color: #43a047 !important;
      color: #2e7d32 !important;
    }
    .wrong {
      background: #ffcdd2 !important;
      border-color: #e53935 !important;
      color: #b71c1c !important;
    }

    button {
      margin-top: 15px;
      padding: 12px 28px;
      cursor: pointer;
      background: linear-gradient(45deg, #42a5f5, #1e88e5);
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 15px;
      transition: all 0.3s ease;
      font-size: 1rem;
      box-shadow: 0 6px 20px rgba(66,165,245,0.4), 0 0 10px #42a5f5 inset;
    }
    button:hover {
      background: linear-gradient(45deg, #64b5f6, #2196f3);
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 25px rgba(33,150,243,0.5), 0 0 15px #64b5f6 inset;
    }

    .hidden { display: none; }

    .message {
      margin-top: 12px;
      font-weight: bold;
      font-size: 1.1em;
      min-height: 1.2em;
      color: #1565c0;
    }

    .progress-container {
      background: #eeeeee;
      border-radius: 25px;
      height: 12px;
      margin-bottom: 15px;
      overflow: hidden;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.2);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #42a5f5, #64b5f6);
      transition: width 0.5s ease;
      border-radius: 25px;
    }

    .score {
      font-size: 14px;
      color: #1565c0;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .attempts {
      font-size: 12px;
      color: #666;
      margin-top: 3px;
      min-height: 1em;
    }

    /* Floating End Quiz button */
    #endQuizBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 14px 26px;
      background: linear-gradient(45deg, #ef5350, #e53935);
      border-radius: 50px;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(239,83,80,0.5);
      transition: all 0.3s ease;
      z-index: 999;
    }
    #endQuizBtn:hover {
      background: linear-gradient(45deg, #e53935, #ef5350);
      transform: scale(1.08);
    }
  </style>
</head>
<body>

<div class="quiz-container" id="quizBox">
  <div class="score" id="scoreDisplay">Score: 0</div>
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <h2 id="question">Question text</h2>
  <div id="options"></div>
  <button id="submitBtn">Submit</button>
  <button id="retryBtn" class="hidden">Retry</button>
  <button id="nextBtn" class="hidden">Next</button>
  <div id="message" class="message"></div>
  <div id="attempts" class="attempts"></div>
</div>
<button id="endQuizBtn">End Quiz</button>

<script>
const quizData = [
  { question: "Q1. Which of these is a perfect square?", options: ["50", "81", "45", "98"], answer: 1 },
  { question: "Q2. The square root of 121 is:", options: ["10", "11", "12", "13"], answer: 1 },
  { question: "Q3. Which number will always have its square ending in 25?", options: ["15", "20", "25", "35"], answer: 3 },
  { question: "Q4. The sum of first 6 odd numbers is:", options: ["25", "36", "49", "64"], answer: 2 },
  { question: "Q5. Which of these cannot be the unit digit of a perfect square?", options: ["1", "4", "7", "9"], answer: 2 }
  // (add more as needed)
];

let currentQuestion = 0;
let selectedOption = null;
let score = 0;
let wrongAttemptsForCurrent = 0;
const MAX_ATTEMPTS = 3;

const questionEl = document.getElementById('question');
const optionsEl = document.getElementById('options');
const submitBtn = document.getElementById('submitBtn');
const retryBtn = document.getElementById('retryBtn');
const nextBtn = document.getElementById('nextBtn');
const messageEl = document.getElementById('message');
const attemptsEl = document.getElementById('attempts');
const progressBar = document.getElementById('progressBar');
const scoreDisplay = document.getElementById('scoreDisplay');
const endQuizBtn = document.getElementById('endQuizBtn');

// 🔊 Free hosted sounds
const correctSound = new Audio("correct-6033.mp3");
const wrongSound   = new Audio("error-04-199275.mp3");

function renderQuestion({ resetAttempts = false } = {}) {
  const q = quizData[currentQuestion];
  if (resetAttempts) wrongAttemptsForCurrent = 0;
  questionEl.textContent = q.question;
  optionsEl.innerHTML = '';
  messageEl.textContent = '';
  attemptsEl.textContent = wrongAttemptsForCurrent > 0
    ? `Attempts used: ${wrongAttemptsForCurrent}/${MAX_ATTEMPTS}` : '';
  submitBtn.classList.remove('hidden');
  retryBtn.classList.add('hidden');
  nextBtn.classList.add('hidden');
  q.options.forEach((option, index) => {
    const div = document.createElement('div');
    div.textContent = option;
    div.classList.add('option');
    div.onclick = () => {
      if (submitBtn.classList.contains('hidden')) return;
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      div.classList.add('selected');
      selectedOption = index;
    };
    optionsEl.appendChild(div);
  });
  updateProgress();
}
function updateProgress() {
  const progress = (currentQuestion / quizData.length) * 100;
  progressBar.style.width = progress + "%";
}
function lockOptions() { document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none'); }
function unlockOptions() { document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'auto'); }

submitBtn.onclick = () => {
  if (selectedOption === null) { alert("Please select an option!"); return; }
  const correctAnswer = quizData[currentQuestion].answer;
  const optionDivs = document.querySelectorAll('.option');
  lockOptions();
  if (selectedOption === correctAnswer) {
    messageEl.textContent = "✅ Correct!";
    score++;
    scoreDisplay.textContent = `Score: ${score}`;
    optionDivs[selectedOption].classList.add('correct');
    correctSound.play();
    submitBtn.classList.add('hidden');
    retryBtn.classList.add('hidden');
    nextBtn.classList.remove('hidden');
  } else {
    wrongAttemptsForCurrent++;
    wrongSound.play();
    optionDivs[selectedOption].classList.add('wrong');
    if (wrongAttemptsForCurrent >= MAX_ATTEMPTS) {
      messageEl.textContent = "❌ Out of attempts.";
      optionDivs[correctAnswer].classList.add('correct');
      submitBtn.classList.add('hidden');
      retryBtn.classList.add('hidden');
      nextBtn.classList.remove('hidden');
      attemptsEl.textContent = `Attempts used: ${wrongAttemptsForCurrent}/${MAX_ATTEMPTS}`;
    } else {
      messageEl.textContent = `❌ Incorrect! Try again (${wrongAttemptsForCurrent}/${MAX_ATTEMPTS})`;
      attemptsEl.textContent = `Attempts used: ${wrongAttemptsForCurrent}/${MAX_ATTEMPTS}`;
      submitBtn.classList.add('hidden');
      retryBtn.classList.remove('hidden');
      nextBtn.classList.add('hidden');
    }
  }
};
retryBtn.onclick = () => { selectedOption = null; unlockOptions(); renderQuestion({ resetAttempts: false }); };
nextBtn.onclick = () => {
  currentQuestion++;
  selectedOption = null;
  if (currentQuestion < quizData.length) {
    renderQuestion({ resetAttempts: true }); unlockOptions();
  } else { endQuiz(); }
};
function endQuiz() {
  progressBar.style.width = "100%";
  questionEl.textContent = "🎉 Quiz Ended!";
  optionsEl.innerHTML = "";
  nextBtn.classList.add('hidden');
  retryBtn.classList.add('hidden');
  submitBtn.classList.add('hidden');
  const attempted = quizData.length;
  const percentage = (score / attempted) * 100;
  let performanceMessage = "";
  if (percentage >= 90) performanceMessage = "🌟 Excellent!";
  else if (percentage >= 70) performanceMessage = "👍 Good Job!";
  else if (percentage >= 50) performanceMessage = "🙂 Average!";
  else performanceMessage = "🔄 Please try again!";
  messageEl.textContent = performanceMessage;
  attemptsEl.textContent = '';
  scoreDisplay.textContent = `Final Score: ${score} / ${attempted} (${Math.round(percentage)}%)`;
}
endQuizBtn.onclick = endQuiz;
renderQuestion({ resetAttempts: true });
</script>
</body>
</html>
